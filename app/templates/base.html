<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}Kanban{% endblock %}</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; color: #222; }
        nav { background: #2d3436; color: white; padding: 0.75rem 1rem; display: flex; justify-content: space-between; }
        nav a { color: white; text-decoration: none; }
        main { padding: 1rem; }
        .board { display: flex; gap: 1rem; align-items: flex-start; }
        .column { background: #f1f2f6; border-radius: 6px; padding: 0.75rem; min-width: 220px; }
        .column h3 { margin-top: 0; }
        .card { background: white; border-radius: 4px; padding: 0.5rem; margin-bottom: 0.5rem; box-shadow: 0 1px 2px rgba(0,0,0,0.15); }
        .comment { border-top: 1px solid #ddd; padding: 0.5rem 0; }
        form.comment-form textarea { width: 100%; }
        ul.notifications { list-style: none; padding: 0; }
        ul.notifications li { padding: 0.5rem; border-bottom: 1px solid #eee; }
        ul.notifications li.unread { font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <span>Kanban</span>
        <a href="/notifications">Notifications ({{ unread_count }})</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
