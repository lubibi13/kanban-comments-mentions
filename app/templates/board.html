{% extends "base.html" %}
{% block title %}{{ board.title }}{% endblock %}
{% block content %}
<h1>{{ board.title }}</h1>
<div class="board">
    {% for column in columns %}
    <div class="column">
        <h3>{{ column.title }}</h3>
        {% for card in cards_by_column.get(column.id, []) %}
        <div class="card">
            <a href="/cards/{{ card.id }}">{{ card.title }}</a>
        </div>
        {% endfor %}
        <form method="post" action="/columns/{{ column.id }}/cards/form">
            <input type="text" name="title" placeholder="New card" required>
            <button type="submit">Add card</button>
        </form>
    </div>
    {% endfor %}
</div>
<form method="post" action="/boards/{{ board.id }}/columns/form">
    <input type="text" name="title" placeholder="New column" required>
    <button type="submit">Add column</button>
</form>
{% endblock %}
